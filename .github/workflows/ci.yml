name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Foundry · Solidity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install OZ + forge-std
        run: |
          forge install --no-git --shallow foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts@v5.1.0 || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv --gas-report

      - name: Coverage
        run: forge coverage --report summary --report lcov
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: forge-coverage
          path: contracts/lcov.info
          if-no-files-found: ignore

  typescript:
    name: pnpm · TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Read pnpm version from package.json's `packageManager` field.
      # Specifying a `version:` here together with `packageManager` causes
      # pnpm/action-setup@v4 to error with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r --filter '@agentmesh/shared' --filter '@agentmesh/x402-server' --filter '@agentmesh/x402-client' test

      - name: Biome lint
        run: pnpm exec biome check .

      - name: Build site
        run: pnpm --filter @agentmesh/site build

  # Solana build is slow (4+ min) and fails on the placeholder program ID
  # until we ship a real keypair. Run on demand only — never on push, so it
  # never sends red-status emails.
  solana:
    name: Anchor · Solana (build only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.31.1
          avm use 0.31.1

      - name: Anchor build
        run: anchor build

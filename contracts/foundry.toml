[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./" }, { access = "read-write", path = "../deployments" }]

[fmt]
line_length = 120
tab_width = 4

[rpc_endpoints]
anvil = "${ANVIL_RPC}"
amoy = "${POLYGON_AMOY_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
polygon = "${POLYGON_RPC}"

[etherscan]
amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api", chain = 80002 }
polygon = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com/api", chain = 137 }
